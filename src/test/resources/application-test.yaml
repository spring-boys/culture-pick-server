spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:culturepick-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop # 테스트 시작 시 테이블 만들고, 테스트 종료 시 제거
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            scope:
              - email
              - profile

  mail:
    host: localhost
    port: 1025
    username: test-mail-user
    password: test-mail-password

cors:
  allowed-origins: http://localhost:5173

oauth2:
  redirect-uri: http://localhost:8080/login/oauth2/code/google

cookie:
  secure: false

jwt:
  secret-key: MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

culture:
  api:
    base-url: http://localhost:9999/culture-test
    service-key: test-culture-api-key
