spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

cookie:
  secure: true

jwt:
  secret-key: ${JWT_SECRET_KEY}

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false