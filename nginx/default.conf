upstream spring-app {
    server spring-app:8080;
}

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name api.songdaegyu.me;

    # Let's Encrypt 인증서 갱신 시 필요한 경로 (standalone 갱신 시엔 불필요하나 webroot 방식 대비)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 실제 서비스
server {
    listen 443 ssl;
    server_name api.songdaegyu.me;

    # Let's Encrypt 인증서 경로 (EC2 호스트의 /etc/letsencrypt 를 컨테이너에 마운트)
    ssl_certificate     /etc/letsencrypt/live/api.songdaegyu.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.songdaegyu.me/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # 요청 바디 최대 크기 (파일 업로드 등이 있으면 늘릴 것)
    client_max_body_size 10M;

    # 일반 HTTP 요청 → Spring (proxy_pass)
    location / {
        proxy_pass http://spring-app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 업그레이드 헤더 (spring-boot-starter-websocket 사용 중)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
